<div class="container" style="padding: 20px; font-family: 'Kanit', sans-serif;">

  <h1 style="color: #333; margin-bottom: 20px;">🎓 Student Management</h1>
  <div style="background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); margin-bottom: 30px; border-left: 5px solid #ea580c;">

    <h3 style="margin-top: 0; color: #ea580c; margin-bottom: 20px;">
      {{ isEditMode ? '✏️ แก้ไขข้อมูลนักเรียน' : '➕ เพิ่มนักเรียนใหม่' }}
    </h3>

    <form [formGroup]="studentForm">
      <div style="display: flex; gap: 25px; flex-wrap: wrap;">

        <div style="flex: 0 0 160px; text-align: center;">
          <img [src]="uploadedImage" style="width: 140px; height: 140px; border-radius: 15px; object-fit: cover; border: 4px solid #f3f4f6; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">

          <div style="position: relative; overflow: hidden; display: inline-block;">
            <button style="background: #f3f4f6; border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; color: #555; font-weight: 500;">
              📷 เลือกรูปภาพ
            </button>
            <input type="file" (change)="onFileSelected($event)" accept="image/*" style="position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;">
          </div>
        </div>

        <div style="flex: 1; display: flex; flex-direction: column; gap: 20px;">

          <div style="display: flex; gap: 20px;">
            <div style="flex: 1;">
              <label style="font-size: 13px; font-weight: 600; color: #666; margin-bottom: 5px; display: block;">รหัสนักเรียน <span style="color: red;">*</span></label>
              <input type="text" formControlName="studentId" placeholder="Ex. 6601" class="form-input" style="width: 100%;">
              <div *ngIf="studentForm.get('studentId')?.invalid && studentForm.get('studentId')?.touched" class="error-msg">⚠️ กรุณากรอกรหัส</div>
            </div>

            <div style="flex: 1;">
              <label style="font-size: 13px; font-weight: 600; color: #666; margin-bottom: 5px; display: block;">เพศ <span style="color: red;">*</span></label>
              <select formControlName="gender" class="form-input" style="width: 100%; cursor: pointer; background-color: white;">
                <option value="male">ชาย (Male)</option>
                <option value="female">หญิง (Female)</option>
              </select>
            </div>
          </div>

          <div style="display: flex; gap: 20px;">
            <div style="flex: 7;">
              <label style="font-size: 13px; font-weight: 600; color: #666; margin-bottom: 5px; display: block;">ชื่อ-นามสกุล <span style="color: red;">*</span></label>
              <input type="text" formControlName="name" placeholder="ระบุชื่อจริง-นามสกุล" class="form-input" style="width: 100%;">
              <div *ngIf="studentForm.get('name')?.invalid && studentForm.get('name')?.touched" class="error-msg">⚠️ กรุณากรอกชื่อ</div>
            </div>

            <div style="flex: 3;">
              <label style="font-size: 13px; font-weight: 600; color: #666; margin-bottom: 5px; display: block;">คะแนน (0-100) <span style="color: red;">*</span></label>
              <input type="number" formControlName="score" class="form-input" style="width: 100%; text-align: center;">
              <div *ngIf="studentForm.get('score')?.invalid && studentForm.get('score')?.touched" class="error-msg">
                <span *ngIf="studentForm.get('score')?.errors?.['min'] || studentForm.get('score')?.errors?.['max']">⚠️ 0-100 เท่านั้น</span>
                <span *ngIf="studentForm.get('score')?.errors?.['required']">⚠️ ห้ามว่าง</span>
              </div>
            </div>
          </div>

          <div style="display: flex; gap: 15px; margin-top: 5px;">
            <button (click)="onSubmit()"
                    [disabled]="studentForm.invalid"
                    [style.background]="isEditMode ? '#f59e0b' : '#ea580c'"
                    style="color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; flex: 1; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
              <span *ngIf="!isEditMode">💾 บันทึกผลการเรียน</span>
              <span *ngIf="isEditMode">💾 บันทึกการแก้ไข</span>
            </button>

            <button *ngIf="isEditMode" (click)="cancelEdit()" style="background: #9ca3af; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;">
              ยกเลิก
            </button>
          </div>

        </div>
      </div>
    </form>
  </div>

  <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
    <button (click)="toggleView()" style="padding: 8px 20px; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.2s;" [style.background]="isListView ? 'white' : '#4f46e5'" [style.color]="isListView ? '#666' : 'white'">
      <span *ngIf="isListView">🔄 เปลี่ยนมุมมองการ์ด</span><span *ngIf="!isListView">🔄 เปลี่ยนมุมมองตาราง</span>
    </button>
  </div>

  <div *ngIf="isListView" style="background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; animation: fadeIn 0.5s;">
    <table style="width: 100%; border-collapse: collapse;">
      <thead style="background: linear-gradient(135deg, #ff9966, #ff5e62); color: white;">
      <tr>
        <th style="padding: 15px;">รหัส</th><th style="padding: 15px;">รูป</th><th style="padding: 15px; text-align: left;">ชื่อ-นามสกุล</th><th style="padding: 15px;">คะแนน</th><th style="padding: 15px;">สถานะ</th><th style="padding: 15px;">จัดการ</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let s of students; let i = index" style="border-bottom: 1px solid #f0f0f0; text-align: center;">
        <td style="padding: 15px; font-weight: bold; color: #666;">{{ s.studentId }}</td>
        <td style="padding: 10px;">
          <img [src]="s['customImage'] ? s['customImage'] : 'https://api.dicebear.com/9.x/avataaars/svg?seed=' + s.studentId" style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); object-fit: cover;">
        </td>
        <td style="padding: 15px; text-align: left;">{{ s.name }}</td>
        <td style="padding: 15px; font-weight: bold;">{{ s.score }}</td>
        <td style="padding: 15px;">
          <span *ngIf="s.score >= 50" style="background: #d1fae5; color: #065f46; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;">✅ สอบผ่าน</span>
          <span *ngIf="s.score < 50" style="background: #fee2e2; color: #991b1b; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;">❌ สอบตก</span>
        </td>
        <td>
          <button (click)="editStudent(i)" style="background: #fff7ed; color: #ea580c; border: 1px solid #fdba74; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s;">
            ✏️ แก้ไข
          </button>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!isListView" style="text-align: center; color: #999; padding: 40px; background: white; border-radius: 15px;">(มุมมอง Card View ซ่อนอยู่)</div>

</div>

<style>
  .form-input {
    height: 45px; /* บังคับความสูงเท่ากันเป๊ะ */
    padding: 0 15px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: all 0.3s;
    background-color: #f9fafb;
    box-sizing: border-box; /* สำคัญ! ป้องกันเบี้ยว */
  }
  .form-input:focus {
    border-color: #ea580c;
    background-color: white;
    box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.1);
  }
  .error-msg {
    color: #dc2626;
    font-size: 12px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
