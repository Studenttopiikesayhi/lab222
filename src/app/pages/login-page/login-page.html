<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white text-center py-3">
          <h4 class="mb-0"><i class="bi bi-person-badge"></i> ระบบเข้าสู่ระบบ</h4>
        </div>
        <div class="card-body p-4">
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <div class="mb-4 text-center">
              <label class="form-label fw-bold d-block mb-2">คุณคือใคร?</label>
              <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" formControlName="role" id="roleTeacher" value="teacher">
                <label class="btn btn-outline-primary" for="roleTeacher">👨‍🏫 อาจารย์</label>

              </div>
            </div>

            <div class="mb-3">
              <label for="userId" class="form-label fw-bold">รหัสผู้ใช้งาน (ID)</label>
              <input type="text" id="userId" class="form-control" formControlName="userId" placeholder="กรอกรหัสผู้ใช้งาน">
            </div>

            <div class="mb-4">
              <label for="password" class="form-label fw-bold">รหัสผ่าน (Password)</label>
              <input type="password" id="password" class="form-control" formControlName="password" placeholder="••••••••">
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg" [disabled]="loginForm.invalid">
                เข้าสู่ระบบ
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
